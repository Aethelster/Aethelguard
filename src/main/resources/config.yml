#   ┌──────────────────────────────────────────────────────────────┐
#   │                 AETHELGUARD CONFIGURATION FILE               │
#   ├──────────────────────────────────────────────────────────────┤
#   │ * Most time values are in ticks. 20 ticks = 1 second.        │
#   │ * Player messages support MiniMessage and legacy color codes.│
#   │ * Restart the server after changing core auth/database logic.│
#   └──────────────────────────────────────────────────────────────┘

# ───────────────────── [ GENERAL SETTINGS ] ─────────────────────
# Prefix added before player-facing plugin messages.
# Legacy color codes are supported here, for example &c, &7, &l.
prefix: "&c[ᴀᴇᴛʜᴇʟɢᴜᴀʀᴅ] &8» &7 "
# Player message language. The plugin loads:
# plugins/Aethelguard/messages/messages_<code>.yml
# Examples: "TR" -> messages_tr.yml, "EN" -> messages_en.yml, "DE" -> messages_de.yml.
# You can add custom languages by creating that file in the messages folder.
default-language: "TR"
# Console/plugin log language only. This does NOT load custom message files.
# Supported values are only "en" and "tr"; any other value behaves like English.
console-language: "en"
# Console text style used only when console-language is "tr".
# "native": keeps normal Turkish characters such as ç, ğ, ı, ö, ş, ü.
# "ascii": converts them to console-safe letters such as c, g, i, o, s, u.
# Use ascii if your hosting panel, Windows console, or server logs show broken Turkish text.
console-text-mode: "ascii"

# ───────────────────── [ DATABASE SETTINGS ] ────────────────────
# MySQL account storage. If enabled is false, local YAML user files are used.
database:
  enabled: false
  host: "localhost"
  port: 3306
  database: "aethelguard_db"
  username: "root"
  password: "password123"
  # MySQL auth table name. Only letters, numbers and underscores are allowed.
  table-name: "aethelguard_auth"
  # JDBC options. Usually keep these defaults unless your database requires otherwise.
  use-ssl: false
  allow-public-key-retrieval: true
  server-timezone: "UTC"
  # HikariCP pool settings. Increase only if your server has many simultaneous auth requests.
  pool:
    maximum-size: 10
    minimum-idle: 2
    connection-timeout-ms: 10000
    idle-timeout-ms: 600000
    max-lifetime-ms: 1800000

# ───────────────────── [ LOGGING SETTINGS ] ─────────────────────
status:
  # Enables /aethelguard status and local user metadata/index files.
  enabled: true
  # If true and database.enabled is false, creates plugins/Aethelguard/users/.
  create-local-users-folder: true
  # Text index written inside the users folder. It maps usernames to UUID file names.
  user-index-file: "user-index.txt"
console-logging:
  # Hides vanilla connection/auth noise such as join/quit, UUID, lost connection,
  # logged in with entity id, and issued server command lines.
  suppress-server-connection-logs: true
  # Logs only successful Aethelguard login/register events to console.
  log-auth-success: true
  # Logs auth state changes such as authenticated quit, unauthenticated quit, and admin unlogin.
  log-auth-state-changes: true
  # Logs when unauthenticated players try to chat.
  log-blocked-chat-attempts: true

# ───────────────────── [ STORAGE SETTINGS ] ─────────────────────
storage:
  # Used only when database.enabled is false.
  # User files are stored under plugins/Aethelguard/<local-users-folder>/
  local-users-folder: "users"

# ───────────────────── [ ADAPTIVE SECURITY SETTINGS ] ───────────
adaptive-security:
  # Master switch for risk-based auth decisions.
  enabled: true
  trusted-ip-captcha-bypass:
    # If true, captcha can be skipped for IPs with repeated successful logins
    # inside the configured time window. Suspicious IP rules always win over this.
    enabled: true
    # Time window for successful login counting.
    window-minutes: 30
    # Successful auth count required inside the time window before captcha is skipped.
    required-successful-logins: 3
  suspicious-ip-extra-captcha:
    # If true, suspicious IPs receive a stronger/different captcha.
    enabled: true
    # Add exact IP addresses here if you want to force extra captcha manually.
    manual-suspicious-ips: []
    reasons:
      # If this IP already registered this many accounts, it becomes suspicious.
      max-accounts-per-ip: 3
      # If this player has this many current wrong password attempts, IP becomes suspicious.
      max-current-wrong-attempts: 2
    vpn-check:
      # Checks public IP reputation APIs before captcha starts.
      # Local/private IPs such as 127.0.0.1 and 192.168.x.x are skipped by default.
      enabled: true
      # IPWHOIS can detect vpn/proxy/tor/hosting. IPAPI can detect proxy/hosting.
      # Keeping both gives better results without requiring an API key.
      providers: ["IPWHOIS", "IPAPI"]
      # How many providers must flag the IP before it is treated as suspicious.
      # 1 is stricter, 2 is safer against false positives.
      min-detections: 1
      # Maximum wait per provider. Keep this low so login is not delayed for long.
      timeout-ms: 2500
      # Successful API results are cached so the same IP is not checked every join.
      cache-minutes: 360
      # true: if every provider fails, allow normal auth. false: treat failed checks as suspicious.
      fail-open: true
      # Usually false. Enable only if you test VPN checks on LAN/proxy-like private addresses.
      check-private-ips: false
      # Logs clean/suspicious provider results to console for debugging.
      log-results: true
    # RANDOM_EXCEPT_NORMAL: picks a random type except the normal captcha type when possible.
    # RANDOM_FROM_LIST: picks randomly from the types list below.
    # FIXED: always uses fixed-type.
    captcha-mode: "RANDOM_EXCEPT_NORMAL"
    fixed-type: "MATH"
    types: ["TEXT", "NUMERIC", "ALPHANUMERIC", "MATH"]

# ───────────────────── [ ACCOUNT RECOVERY SETTINGS ] ────────────
recovery:
  # Enables password recovery through security questions or backup codes.
  enabled: true
  # If true, players who reach wrong-password max-attempts are shown recovery help
  # before being kicked. If false, normal kick behavior is used.
  offer-before-kick: true
  security-questions:
    # Enables /securityquestion setup/change and question-based /recover.
    # Question texts are loaded from security_questions_<default-language>.yml.
    enabled: true
  backup-codes:
    # Enables /backupcodes generate and backup-code based /recover.
    enabled: true
    # How many one-time backup codes are created with /backupcodes generate.
    count: 6
    # Backup code length. Minimum is 6.
    length: 10

# ───────────────────── [ SECURITY COOLDOWN SETTINGS ] ───────────
security-cooldowns:
  # Prevents sensitive account security commands from being changed too often.
  enabled: true
  commands:
    # Player password change cooldown.
    changepassword-hours: 72
    # 2FA setup cooldown.
    two-factor-setup-hours: 24
    # 2FA disable cooldown.
    two-factor-disable-hours: 72
    # Security question setup/change cooldown.
    security-question-change-hours: 72
    # Recovery method change cooldown.
    recovery-method-change-hours: 72
    # Backup code regeneration cooldown.
    backup-code-generate-hours: 24
    # Password recovery cooldown.
    recover-hours: 24
  custom:
    # Admins can add extra player commands here. These use the single hours value below.
    enabled: true
    hours: 24
    commands: []

# ───────────────────── [ AUTH CORE SETTINGS ] ───────────────────
auth-settings:
  # Sends unauthenticated players to the void-zone until they login/register.
  # Their real location is remembered, but the void-zone is never saved as a restore location.
  teleport-to-void: true
  # Applies blindness while the player is not authenticated.
  apply-blindness: true
  # Clears only that player's chat after successful login/register, then sends the success message.
  clear-chat-on-auth: true
  # Logs denied commands used before authentication. Login/register commands are never logged.
  log-unauthenticated-command-attempts: true

  registration:
    ip-limit:
      # Limits how many accounts can be registered from the same IP address.
      enabled: true
      # Maximum account count per IP. Set 0 or a negative number for unlimited.
      max-accounts: 2
      # Players with this permission can register even when their IP reached the limit.
      bypass-permission: "aethelguard.bypass.iplimit"

  password-policy:
    # Shared password rules for /register, player /changepassword, /recover,
    # and admin /aethelguard changepassword.
    # Keep enabled true if you want consistent account safety across every password flow.
    enabled: true
    # Minimum password length. Default is intentionally modest for compatibility.
    min-length: 4
    # Maximum password length. Helps prevent extremely large input from being hashed.
    max-length: 64
    # If true, passwords must contain at least one letter.
    require-letter: false
    # If true, passwords must contain at least one number.
    require-number: false
    # If true, the player's username cannot appear inside the password.
    block-username: true
    # If false, passwords cannot contain Turkish-specific characters:
    # ç, ğ, ı, ö, ş, ü and their uppercase variants.
    # Keep true if your player base commonly uses Turkish keyboards.
    allow-turkish-characters: true
    # If false, punctuation characters such as ! ? . , _ - @ # are not allowed.
    # Default true because punctuation makes stronger passwords easier to create.
    allow-punctuation: true
    # If true, passwords may contain emoji, special font symbols, and other
    # non-standard characters outside normal letters, numbers, and punctuation.
    # Default false for compatibility with consoles, databases, and support workflows.
    allow-non-alphabet-symbols: false
    # Words or fragments that cannot appear inside passwords.
    # This is checked case-insensitively and Turkish letters are normalized for matching,
    # so "şifre" and "sifre" are treated similarly.
    # You can remove, add, or fully replace this list for your community.
    blocked-words:
      - "admin"
      - "password"
      - "sifre"
      - "şifre"
      - "123456"
      - "qwerty"
      - "fuck"
      - "shit"
      - "bitch"
      - "asshole"
      - "bastard"
      - "dick"
      - "pussy"
      - "cunt"
      - "orospu"
      - "amk"
      - "aq"
      - "siktir"
      - "sik"
      - "pic"
      - "piç"
      - "yarrak"
      - "göt"
      - "got"

  captcha:
    # Requires players to solve a captcha before /login or /register can be used.
    enabled: true
    # Default is MAP. You can add other types if you want random selection.
    # Available types:
    # - MAP: gives the player a map item with the captcha code.
    # - TEXT: letters only.
    # - NUMERIC: numbers only.
    # - ALPHANUMERIC: letters and numbers.
    # - MATH: simple math question.
    # Example for random captcha types:
    # types: ["MAP", "TEXT", "NUMERIC", "ALPHANUMERIC", "MATH"]
    types: ["MAP"]
    # Used by TEXT, NUMERIC, ALPHANUMERIC and MAP.
    length: 5
    # false is recommended so players can type letters without worrying about case.
    case-sensitive: false
    # Captcha lifetime in seconds. When it expires, a new one is generated.
    timeout-seconds: 60
    # Delay between /captcha attempts. Prevents spam and brute force.
    cooldown-seconds: 2
    # Wrong captcha attempts before captcha punishment.
    # This counter is separate from wrong-password.max-attempts.
    max-attempts: 5
    # true: kick after captcha max-attempts.
    # false: generate a new captcha instead of kicking.
    # This does not affect wrong-password.kick-enabled.
    kick-enabled: true
    map:
      # Gives a filled map item when MAP captcha is selected.
      give-item: true
      item-name: "<yellow>Captcha"
    success-sound:
      enabled: true
      sound: "entity.experience_orb.pickup"
      volume: 1.0
      pitch: 1.4
      repeat-times: 1
      repeat-interval-ticks: 1

  two-factor:
    # Enables authenticator app support. Google Authenticator, Microsoft Authenticator,
    # Authy and similar apps all use the same TOTP standard.
    enabled: true
    # Name shown inside authenticator apps when players add their secret.
    issuer: "Aethelguard"
    # Allows small clock drift. 1 means previous/current/next 30-second code is accepted.
    code-window: 1

  # ───────────────────── [ SESSION SETTINGS ] ────────────────────
  sessions:
    # Allows recently authenticated players to rejoin without typing /login again.
    # Sessions are kept in memory and reset when the server restarts.
    enabled: true
    # How long a session stays valid after successful login/register.
    duration-minutes: 10
    # true: auto-login only works from the same IP address.
    # Recommended for public/offline-mode servers.
    match-ip: true

  # ─────────────────── [ VOID ZONE SETTINGS ] ───────────────────
  void-zone:
    # Temporary auth location. High Y keeps unauthenticated players away from the world.
    x: 0.0
    y: 1000.0
    z: 0.0
    # true: use the player's current world. false: use the world name below.
    use-player-world: true
    # Used only when use-player-world is false. Example: "world"
    world: ""

  # ─────────────────── [ EFFECT SETTINGS ] ──────────────────────
  effects:
    # Blindness duration in ticks. A large value keeps it active until auth succeeds.
    blindness-duration-ticks: 999999
    # Potion amplifier: 0 = level I, 1 = level II.
    blindness-amplifier: 1
    # Locks the player's personal time while unauthenticated.
    lock-player-time: true
    # 18000 is midnight. Used only when lock-player-time is true.
    locked-time: 18000

  # ─────────────────── [ PROMPT SETTINGS ] ──────────────────────
  prompts:
    # Master switch for auth reminder messages.
    # false: no repeating prompt task is started.
    enabled: true
    # Delay before the first reminder. 20 ticks = 1 second.
    initial-delay-ticks: 20
    # Captcha reminder repeat switch.
    # false: the captcha message is sent once when the player enters captcha state.
    captcha-repeat-enabled: true
    # Captcha reminder delay. 200 ticks = 10 seconds.
    captcha-interval-ticks: 200
    # Login reminder repeat switch.
    # false: the login message is sent once when the player enters login state.
    login-repeat-enabled: true
    # Login reminder delay. 200 ticks = 10 seconds.
    login-interval-ticks: 200
    # Register reminder repeat switch.
    # false: the register message is sent once when the player enters register state.
    register-repeat-enabled: true
    # Register reminder delay. 200 ticks = 10 seconds.
    register-interval-ticks: 200
    # Two-factor reminder repeat switch.
    # false: the /2fa message is sent once when the player enters two-factor state.
    two-factor-repeat-enabled: true
    # Two-factor reminder delay. 200 ticks = 10 seconds.
    two-factor-interval-ticks: 200

  bossbar:
    # Shows a bossbar with the command the player must use while waiting for auth.
    enabled: true
    # Available colors: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE.
    color: "YELLOW"
    # Available styles: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20.
    style: "SOLID"
    # Visual fill amount between 0.0 and 1.0.
    progress: 1.0

  # ─────────────────── [ TIMEOUT SETTINGS ] ─────────────────────
  timeout:
    # Enables auth timeout checks for unauthenticated players.
    enabled: true
    # Time before timeout triggers. 1200 ticks = 60 seconds.
    ticks: 1200
    # true: restore the player to a safe location, then kick.
    # false: only logs timeout; the player stays online.
    kick: true

  # ─────────────────── [ RESTRICTION SETTINGS ] ─────────────────
  restrictions:
    # Locks position while unauthenticated, but still lets the player rotate camera.
    prevent-movement: true
    # Cancels damage, block break/place, and chat before auth.
    prevent-damage: true
    prevent-block-break: true
    prevent-block-place: true
    prevent-chat: true
    # If true, players on login/register screen cannot see normal player chat.
    hide-chat-from-unauthenticated: true

  # ─────────────────── [ ALLOWED COMMAND SETTINGS ] ─────────────
  commands:
    # Commands allowed before authentication.
    # Login/register and their aliases are handled silently so passwords do not appear in console.
    allowed:
      - "/login"
      - "/giris"
      - "/giriş"
      - "/register"
      - "/kayitol"
      - "/kayit"
      - "/captcha"
      - "/dogrula"
      - "/doğrula"
      - "/twofactor"
      - "/2fa"
      - "/authenticator"
      - "/authy"
      - "/kayıtol"
      - "/recover"
      - "/sifresifirla"
      - "/şifresıfırla"
      - "/kurtar"

  # ─────────────────── [ WRONG PASSWORD SETTINGS ] ──────────────
  wrong-password:
    # Failed /login password attempts before password punishment.
    # This counter is separate from captcha.max-attempts.
    # /register does not use this as a password-fail counter because new accounts
    # only compare password confirmation before creating the account.
    max-attempts: 3
    # true: kick after wrong-password max-attempts.
    # false: show remaining attempts but never kick.
    # This does not affect captcha.kick-enabled.
    kick-enabled: true

  # ─────────────────── [ SOUND SETTINGS ] ───────────────────────
  sounds:
    # Master switch for every auth sound below.
    enabled: true
    # Sound names use Minecraft namespaced keys, for example entity.player.levelup.
    # repeat-times repeats the sound; repeat-interval-ticks controls delay between repeats.
    register-success:
      enabled: true
      sound: "entity.ender_dragon.growl"
      volume: 1.0
      pitch: 1.0
      repeat-times: 2
      repeat-interval-ticks: 6
    login-success:
      enabled: true
      sound: "entity.player.levelup"
      volume: 1.0
      pitch: 1.0
      repeat-times: 2
      repeat-interval-ticks: 6
    wrong-password:
      enabled: true
      sound: "entity.item.break"
      volume: 1.0
      pitch: 1.0
      repeat-times: 1
      repeat-interval-ticks: 4
