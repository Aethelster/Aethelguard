# ============================================================
#                AETHELGUARD LANGUAGE FILE
# ============================================================
# Supports MiniMessage tags, RGB colors, and placeholders.
# Examples:
#   <green>Success
#   <#55ff99>Custom RGB color
#   {player}, {uuid}, {remaining}, {limit}
# Use \n inside a message if you want a new line.
# ============================================================

messages:
