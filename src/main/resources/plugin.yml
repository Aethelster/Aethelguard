name: Aethelguard
version: '${version}'
main: me.aethelster.aethelguard.Aethelguard
api-version: '1.21'
author: Aethelster
description: Aethelguard auth system with clean logs and configurable security.
commands:
  aethelguard:
    description: Aethelguard admin commands.
    aliases: [ag, aeg, ayarlar]
    permission: aethelguard.admin
  register:
    description: Register your account.
    aliases: [kayitol, kayıtol, kayit]
  login:
    description: Log in to your account.
    aliases: [giris, giriş]
  pin:
    description: Log in to your account with PIN.
    aliases: [pingiris]
  setpin:
    description: Create your account PIN.
    aliases: [pinayarla]
  changepin:
    description: Change your account PIN.
    aliases: [pindegistir]
  authmode:
    description: Choose password or PIN authentication mode.
    aliases: [authmodu]
  changepassword:
    description: Change your own account password.
    aliases: [sifredegistir, şifredeğiştir, password]
  captcha:
    description: Solve your Aethelguard captcha challenge.
    aliases: [dogrula, doğrula]
  twofactor:
    description: Manage or verify two-factor authentication.
    aliases: [2fa, authenticator, authy]
  securityquestion:
    description: Set or change your account security question.
    aliases: [securityq, guvenliksorusu, güvenliksorusu]
  backupcodes:
    description: Generate account recovery backup codes.
    aliases: [backupcode, yedekkodlar, kurtarmakodlari]
  recoverymethod:
    description: Choose your preferred account recovery method.
    aliases: [recovery, kurtarmayontemi]
  recover:
    description: Recover your account password.
    aliases: [sifresifirla, şifresıfırla, kurtar]
permissions:
  aethelguard.admin:
    description: Allows access to Aethelguard admin commands.
    default: op
  aethelguard.bypass.iplimit:
    description: Bypasses the per-IP registration limit.
    default: op
